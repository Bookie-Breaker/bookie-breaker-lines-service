version: "2"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Bookie-Breaker

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - bodyclose
    - nilerr

  settings:
    misspell:
      locale: US

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
